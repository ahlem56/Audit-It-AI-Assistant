services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/app/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  backend_data:
